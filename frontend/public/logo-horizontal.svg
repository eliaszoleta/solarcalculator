<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 88" width="420" height="88">
  <!-- Icon: dark navy square mark -->
  <rect x="0" y="0" width="88" height="88" rx="14" fill="#0f2744"/>
  <!-- Solar panel grid 3x2 -->
  <rect x="9"  y="22" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <rect x="34" y="22" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <rect x="59" y="22" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <rect x="9"  y="40" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <rect x="34" y="40" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <rect x="59" y="40" width="20" height="14" rx="2.5" fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.6"/>
  <!-- Sun arc -->
  <path d="M14 20 Q44 5 74 20" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- $↑ savings indicator -->
  <text x="44" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#f59e0b">$↑</text>

  <!-- Wordmark -->
  <text x="104" y="46" font-family="Georgia, serif" font-weight="700" font-size="38" fill="#111827" letter-spacing="-1">My<tspan fill="#f59e0b">Solar</tspan><tspan fill="#111827">Widget</tspan></text>
  <text x="106" y="66" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" letter-spacing="2.5">SOLAR SAVINGS CALCULATOR</text>
</svg>
